# ============================================================================
# Plain HTTP by default — runs as-is for local / LAN testing:
#     docker compose up -d --build      ->   http://<host>
#
# To switch to HTTPS (port 443 and the cert mounts are already in
# docker-compose.yml, so you only edit THIS file):
#     1. Get a cert (the stack can stay running — see README):
#          sudo certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
#     2. Comment out the "HTTP-ONLY" server block below.
#     3. Uncomment the two "HTTPS" server blocks and set your domain.
#     4. In ../backend/.env set DEBUG=False and the https:// URLs.
#     5. docker compose up -d --force-recreate
# ============================================================================


# ===== HTTP-ONLY (default) — comment this whole block out to enable HTTPS =====
server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Lets `certbot --webroot` validate the domain without taking nginx down,
    # so you can issue a cert while still serving HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


